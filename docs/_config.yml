title: Official SpecFact Modules Docs
description: Canonical documentation for official nold-ai bundles and module-specific deep workflows.
baseurl: ""
url: "https://modules.specfact.io"
docs_home_url: "https://docs.specfact.io"
core_cli_docs_url: "https://docs.specfact.io"
modules_docs_url: "https://modules.specfact.io"
github_pages_preview_label: "GitHub Pages preview origin"

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-relative-links
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .github
  - .cursor
  - .specfact
  - tests
  - tools
  - packages
  - tests
  - tools
  - scripts
  - registry

source: .
destination: _site

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
  - scope:
      path: ""
      type: pages
      exclude:
        - "assets/**"
    values:
      permalink: /:basename/
  - scope:
      path: "getting-started"
    values:
      layout: default
  - scope:
      path: "guides"
    values:
      layout: default
  - scope:
      path: "reference"
    values:
      layout: default
theme: minima
minima:
  social:
    github:
      username: nold-ai
      repository: specfact-cli-modules
  author:
    name: NOLD AI
    email: hello@noldai.com
  skin: auto
  show_excerpts: true

sass:
  style: compressed
  sourcemap: never

footer:
  copyright: "© 2026 NOLD AI"
  trademark: >
    Official bundle and module-specific deep guidance is canonically owned by specfact-cli-modules.
