command: specfact code review run
scenarios:
  - name: clean-json-pass
    type: pattern
    argv:
      - --json
      - tests/fixtures/review/clean_module.py
    expect:
      exit_code: 0
      stdout_contains:
        - '"overall_verdict":"PASS"'
  - name: full-scope-package-subtree
    type: pattern
    argv:
      - --scope
      - full
      - --path
      - packages/specfact-code-review
      - --json
    expect:
      exit_code: 0
      stdout_contains:
        - '"run_id":'
  - name: changed-scope-subtree
    type: pattern
    argv:
      - --scope
      - changed
      - --path
      - packages/specfact-code-review
      - --path
      - tests/unit/specfact_code_review
      - --json
    expect:
      exit_code: 0
      stdout_contains:
        - '"run_id":'
  - name: missing-file-errors
    type: anti-pattern
    argv:
      - tests/fixtures/review/missing.py
    expect:
      exit_code: 2
      stderr_contains:
        - not found
  - name: positional-files-cannot-mix-with-scope
    type: anti-pattern
    argv:
      - tests/fixtures/review/clean_module.py
      - --scope
      - full
      - --path
      - tests/fixtures/review
    expect:
      exit_code: 2
      stderr_contains:
        - choose positional files or auto-scope controls
  - name: mode-shadow-dirty-exit-zero
    type: pattern
    argv:
      - --json
      - --mode
      - shadow
      - tests/fixtures/review/dirty_module.py
    expect:
      exit_code: 0
      stdout_contains:
        - review-report.json
  - name: mode-enforce-dirty-exit-nonzero
    type: pattern
    argv:
      - --json
      - --mode
      - enforce
      - tests/fixtures/review/dirty_module.py
    expect:
      exit_code: 1
      stdout_contains:
        - review-report.json
  - name: focus-source-and-docs-union
    type: pattern
    argv:
      - --scope
      - full
      - --path
      - packages/specfact-code-review
      - --json
      - --focus
      - source
      - --focus
      - docs
    expect:
      exit_code: 0
      stdout_contains:
        - '"run_id":'
  - name: focus-tests-narrows-to-test-tree
    type: pattern
    argv:
      - --scope
      - full
      - --path
      - packages/specfact-code-review
      - --json
      - --focus
      - tests
    expect:
      exit_code: 0
      stdout_contains:
        - '"run_id":'
  - name: level-error-json-clean-module
    type: pattern
    argv:
      - --json
      - --level
      - error
      - tests/fixtures/review/clean_module.py
    expect:
      exit_code: 0
      stdout_contains:
        - review-report.json
  - name: focus-cannot-combine-with-include-tests
    type: anti-pattern
    argv:
      - tests/fixtures/review/clean_module.py
      - --focus
      - source
      - --include-tests
    expect:
      exit_code: 2
      stderr_contains:
        - Cannot combine --focus with --include-tests or --exclude-tests
