repos:
  - repo: local
    hooks:
      - id: format
        name: Run ruff format + autofix
        entry: hatch run format
        language: system
        pass_filenames: false
      - id: type-check
        name: Run basedpyright type checks
        entry: hatch run type-check
        language: system
        pass_filenames: false
      - id: lint
        name: Run lint suite (ruff + pylint)
        entry: hatch run lint
        language: system
        pass_filenames: false
      - id: yaml-lint
        name: Validate module registry manifests
        entry: hatch run yaml-lint
        language: system
        pass_filenames: false
      - id: check-bundle-imports
        name: Enforce bundle import boundaries
        entry: hatch run check-bundle-imports
        language: system
        pass_filenames: false
