name: docs-pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby (for Jekyll)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false
          working-directory: ./docs

      - name: Install Jekyll dependencies
        run: |
          cd docs
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 1 --retry 3

      - name: Build with Jekyll
        run: |
          cd docs
          bundle exec jekyll build --destination ../_site
          # Fix CSS path: Jekyll outputs main.css at main/index.css due to permalink pattern
          # Copy it to assets/main.css where the HTML expects it
          if [ -f ../_site/main/index.css ]; then
            cp ../_site/main/index.css ../_site/assets/main.css
          fi
        env:
          JEKYLL_ENV: production

      - name: Set up Python (docs validation)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate docs site and bundle lockfile
        run: |
          python -m pip install --upgrade pip
          python -m pip install click typer PyYAML beartype icontract rich pydantic specfact-cli
          python scripts/check-docs-commands.py --jekyll-bundle-check

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
